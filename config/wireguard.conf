# WireGuard settings used by the archarden script.
#
# Default behavior:
# - Peers are generated automatically as: <server-shortname>.<hex4>
# - Peer state is tracked in: /var/lib/archarden/wireguard/peers.json
# - Override the peer count at runtime with: --wg-peers <N>
#
# Legacy behavior:
# - If WG_PEERS is defined (name:address entries), the script will use those peers.
#   This disables automatic peer generation.

WG_INTERFACE_ADDRESS="10.66.66.1/24"
WG_LISTEN_PORT="51820"
WG_DNS="10.66.66.1"

# Default number of peers to generate when --wg-peers is not provided.
WG_PEERS_COUNT="1"

# Legacy explicit peer list (optional).
# Format: "name:10.66.66.2/32".
#WG_PEERS=(
#    "laptop:10.66.66.2/32"
#    "phone:10.66.66.3/32"
#)
