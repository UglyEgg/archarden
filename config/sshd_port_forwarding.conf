# archarden: SSH port-forwarding policy
# Default deny; allow only local (-L) tunnels for the SSH admin user.
AllowTcpForwarding no

Match User __SSH_ADMIN_USER__
    AllowTcpForwarding local
    GatewayPorts no
    # Limit local port forwards to the private admin endpoints.
    PermitOpen __WG_BIND_IP__:__NPM_ADMIN_PORT__ __WG_BIND_IP__:3001

Match all
